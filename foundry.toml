[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Optimizer on so AgentAccount + the factory that embeds it stay under the
# EIP-170 24576-byte runtime limit (open-mode + JIT additions pushed the
# un-optimized factory ~288 B over). Source semantics unchanged.
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
